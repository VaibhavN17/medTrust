services:
  mysql:
    image: mysql:8.0
    container_name: medtrust-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-medtrust}
    ports:
      - "${MYSQL_HOST_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./backend/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -p$$MYSQL_ROOT_PASSWORD --silent"]
      interval: 10s
      timeout: 5s
      retries: 20

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: medtrust-backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      CLIENT_URL: ${CLIENT_URL:-*}
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: root
      DB_PASS: ${MYSQL_ROOT_PASSWORD:-root}
      DB_NAME: ${MYSQL_DATABASE:-medtrust}
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "5000:5000"
    volumes:
      - ./backend/uploads:/app/uploads

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-}
        NEXT_PUBLIC_RAZORPAY_KEY_ID: ${NEXT_PUBLIC_RAZORPAY_KEY_ID:-}
    container_name: medtrust-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "3000:3000"

  ml-service:
    build:
      context: ./ml-service
      dockerfile: Dockerfile
    container_name: medtrust-ml-service
    restart: unless-stopped
    environment:
      ENV: production
      HOST: 0.0.0.0
      PORT: 8000
      CORS_ORIGINS: http://localhost:5000,http://localhost:3000
    depends_on:
      - backend
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  mysql_data:
